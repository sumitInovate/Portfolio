  <line x1="22" y1="10" x2="26" y2="22" stroke="#4A9EFF" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="19.5" y1="17" x2="24.5" y2="17" stroke="#4A9EFF" stroke-width="1.8" stroke-linecap="round"/>
